<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- background -->
  <rect width="64" height="64" fill="#0b0b0f"/>
  <!-- 2px lime border -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#c6f135" stroke-width="2"/>
  <!-- bold pixel E -->
  <g fill="#c6f135">
    <rect x="14" y="14" width="36" height="8"/>   <!-- top bar -->
    <rect x="14" y="28" width="28" height="8"/>   <!-- mid bar -->
    <rect x="14" y="42" width="36" height="8"/>   <!-- bottom bar -->
    <rect x="14" y="14" width="8"  height="36"/>  <!-- left vertical -->
  </g>
  <!-- small cyan accent — terminal cursor next to the E -->
  <rect x="52" y="46" width="6" height="4" fill="#35f1e4"/>
</svg>
